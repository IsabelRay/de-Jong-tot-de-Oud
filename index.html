<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finally Fosters | Celebration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@200;300;400;500&display=swap');

        :root {
            --bg-color: #f7f9f6;         /* Ultra-clean editorial off-white */
            --primary-text: #212522;     /* Deep charcoal typography */
            --muted-text: #667068;       /* Classy muted olive-grey */
            --accent-bronze: #bfa17a;    /* Bright luxury bronze */
            --font-display: 'Cinzel', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--primary-text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* THE SPLIT SCREEN LAYOUT */
        .split-container {
            display: flex;
            width: 100vw;
            min-height: 100vh;
        }

        /* LEFT SIDE: FIXED PREMIUM IMAGE */
        .image-side {
            width: 45%;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            background-color: #e2ede4; /* Fallback if image fails */
        }

        .image-side img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Crops image cleanly to fill the space like Wix */
            object-position: center;
        }

        /* RIGHT SIDE: SCROLLING CONTENT */
        .content-side {
            width: 55%;
            margin-left: 45%; /* Pushes content right so it doesn't hide behind image */
            padding: 5rem 10% 5rem 8%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* TYPOGRAPHY & SECTIONS */
        .brand-header {
            margin-bottom: 5rem;
        }

        .brand-header h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            line-height: 1.3;
            color: var(--primary-text);
        }

        .brand-header p {
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent-bronze);
            margin-top: 1rem;
            font-weight: 400;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 2rem;
            color: var(--primary-text);
            border-bottom: 1px solid var(--accent-bronze);
            padding-bottom: 0.5rem;
            width: 100%;
        }

        .details-block {
            margin-bottom: 4rem;
            width: 100%;
        }

        .detail-row {
            margin-bottom: 1.8rem;
            font-size: 1.05rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .detail-row strong {
            font-family: var(--font-display);
            display: inline-block;
            width: 120px;
            color: var(--accent-bronze);
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .rsvp-container {
            width: 100%;
            margin-top: 2rem;
        }

        iframe {
            border: none;
            width: 100%;
            height: 750px;
            margin-top: 1rem;
        }

        /* MOBILE RESPONSIVE (Stacks image on top, text on bottom like a phone app) */
        @media (max-width: 960px) {
            .split-container {
                flex-direction: column;
            }
            .image-side {
                width: 100%;
                height: 45vh;
                position: relative;
            }
            .content-side {
                width: 100%;
                margin-left: 0;
                padding: 3rem 2rem;
            }
            .brand-header {
                margin-bottom: 3rem;
            }
            .brand-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="split-container">
        
        <!-- LEFT SIDE: PHOTO -->
        <div class="image-side">
            <!-- ⚠️ CHANGE 'event-photo.jpg' TO YOUR EXACT FILENAME SENSITIVE TO CAPITAL LETTERS -->
            <img src="background.jpeg" alt="Celebration Image">
        </div>

        <!-- RIGHT SIDE: INFORMATION & RSVP -->
        <div class="content-side">
            
            <!-- Main Title Title -->
            <header class="brand-header">
                <h1>de Jong tot <br>de Oud</h1>
                <p>The Celebration</p>
            </header>

            <!-- Details Section -->
            <div class="details-block">
                <h2 class="section-title">The Details</h2>
                
                <div class="detail-row">
                    <strong>Date</strong> <span>17 December 2026</span>
                </div>
                <div class="detail-row">
                    <strong>Time</strong> <span>13:00 fok off huis toe 00:00</span>
                </div>
                <div class="detail-row">
                    <strong>Location</strong> <span>Landtscap, Stellenbosch</span>
                </div>
                <div class="detail-row">
                    <strong>Attire</strong> <span>Kak fancy</span>
                </div>
            </div>

            <!-- RSVP Section -->
            <div class="rsvp-container">
                <h2 class="section-title">RSVP</h2>
                
                <!-- ⚠️ PASTE YOUR GOOGLE FORM IFRAME CODE DIRECTLY BELOW THIS LINE ⚠️ -->
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdHNmDCBdF4n0brLFRBtxbuAj5vk9_trVc_B_z1MiqTYSEcIQ/viewform?embedded=true" width="640" height="1009" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
            </div>

        </div>
    </div>

</body>
</html>
