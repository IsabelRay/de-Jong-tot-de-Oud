<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>de Jong tot de Oud</title>
    <style>
        /* This is CSS. It styles your website to look beautiful! */
        /* 1. IMPORT PREMIUM FONTS FROM GOOGLE */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap');

    /* 2. DESIGN VARIABLES (Midnight Elegance Palette) */
    /* If you prefer Botanical, change these to sage/olive greens! */
        :root {
            /* NEW COLOR PALETTE */
            --bg-color: #e2ede4;        /* Lighter, beautiful sage green background */
            --card-bg: #ffffff;         /* Clean white content card */
            --header-bg: #6b8e73;       /* Fresh, mid-tone light botanical green header */
            --accent-color: #e5a93b;     /* Bright, metallic striking bronze */
            --text-main: #252b26;        /* Deep organic charcoal */
            --text-muted: #556358;       /* Muted green-gray for secondary text */
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--header-bg) 0%, #4a6650 100%);
            color: white;
            width: 100%;
            text-align: center;
            padding: 5rem 0 6rem 0;
            position: relative;
        }

        header h1 {
            font-family: var(--font-heading);
            font-size: 3rem;
            margin: 0 0 1rem 0;
            letter-spacing: 1px;
            font-weight: 700;
            padding: 0 1rem;
        }

        header p {
            font-size: 1.2rem;
            color: var(--accent-color);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600; /* Made slightly bolder to pop */
        }

        header::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 24px;
            background-color: var(--bg-color);
            clip-path: ellipse(60% 100% at 50% 100%);
        }

        .container {
            max-width: 750px;
            width: 90%;
            background: var(--card-bg);
            margin: -3rem 0 4rem 0;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(44, 62, 43, 0.12);
            border-radius: 16px;
            position: relative;
            z-index: 10;
            box-sizing: border-box;
        }

        .event-details {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .event-details h2 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            color: var(--header-bg);
            margin-top: 0;
            margin-bottom: 2rem;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .detail-card {
            background: #f3f7f4; /* Subtle matching tint */
            padding: 1.5rem;
            border-radius: 12px;
            border-top: 4px solid var(--accent-color);
            transition: transform 0.2s ease;
        }

        .detail-card:hover {
            transform: translateY(-5px);
        }

        .detail-card strong {
            display: block;
            color: var(--header-bg);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .detail-card span {
            font-size: 1.05rem;
            font-weight: 600;
        }

        .intro-text {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 550px;
            margin: 2rem auto 0 auto;
        }

        /* NEW STYLE FOR YOUR EVENT IMAGE */
        .event-image-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 2.5rem 0;
            border-top: 1px solid #e2ede4;
            border-bottom: 1px solid #e2ede4;
            padding: 2rem 0;
        }

        .event-image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .form-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 1rem;
        }

        .form-container h2 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            color: var(--header-bg);
            margin-top: 0;
            margin-bottom: 1.5rem;
        }

        iframe {
            border: none;
            width: 100%;
            max-width: 640px;
            height: 750px;
            border-radius: 12px;
        }

        @media (max-width: 600px) {
            header { padding: 4rem 0 5rem 0; }
            header h1 { font-size: 2.2rem; }
            .container { padding: 1.5rem; margin-top: -2rem; }
            .event-details h2, .form-container h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1> Come watch us be obnoxiously happy</h1>
        <p>J Ons is net te oulik</p>
    </header>

    <!-- Main Content Container -->
    <div class="container">
        
        <!-- Event Details Section -->
        <div class="event-details">
            <h2>Event Details</h2>
            <p class="detail-item"><strong> </strong> 17 December 2026</p>
            <p class="detail-item"><strong> </strong> 13.00 en fok off teen 00.00</p>
            <p class="detail-item"><strong> </strong> Landtscap, Stellenbosch</p>
            <p class="detail-item"><strong> </strong> Trek kak fancy aan</p>
            <p>Please let us know if you can make it by filling out the RSVP form below. We can't wait to celebrate with you!</p>
        </div>

        <!-- RSVP Form Section -->
        <div class="form-container">
            <h2>RSVP Here</h2>
            
            <!-- PASTE YOUR GOOGLE FORM IFRAME CODE DIRECTLY BELOW THIS LINE -->
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdHNmDCBdF4n0brLFRBtxbuAj5vk9_trVc_B_z1MiqTYSEcIQ/viewform?embedded=true" width="640" height="1009" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
            <!-- PASTE YOUR GOOGLE FORM IFRAME CODE DIRECTLY ABOVE THIS LINE -->

        </div>
    </div>

</body>
</html>
